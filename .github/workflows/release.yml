---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release in x.y.z format (without leading v)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read # writes (tag push, release) go through the App token below

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Assert Main Branch
        run: |
          if [[ "$REF" != "refs/heads/main" ]]; then
            printf 'ERROR: release must be triggered from main, got: %s\n' "$REF" >&2
            exit 2
          fi
        env:
          REF: ${{ github.ref }}

      - name: Validate Version
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'ERROR: version must be x.y.z, got: %s\n' "$VERSION" >&2
            exit 2
          fi
          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            printf 'ERROR: release v%s already exists\n' "$VERSION" >&2
            exit 2
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}

      - id: app
        name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          token: ${{ steps.app.outputs.token }}

      - name: Set Up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run Tests
        run: npm test

      - name: Create Tag
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
        env:
          VERSION: ${{ inputs.version }}
          APP_SLUG: ${{ steps.app.outputs.app-slug }}

      - name: Create GitHub Release
        run: gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          VERSION: ${{ inputs.version }}
